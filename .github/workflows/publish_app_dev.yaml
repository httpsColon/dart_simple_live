name: Build Windows App

# 触发条件：手动触发或推送 master 分支
on:
  workflow_dispatch:
  push:
    branches:
      - master # 修改1：监听 master 分支的推送

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # 1. 签出代码
      - uses: actions/checkout@v4
        with:
          ref: master # 修改2：明确指定检出 master 分支
          fetch-depth: 1

      # 2. 设置 Flutter 环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # 3. 启用 Windows 桌面支持
      - name: Enable Flutter Desktop
        run: flutter config --enable-windows-desktop

      # 4. 获取项目依赖
      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get

      # 5. 安装打包工具 flutter_distributor
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      # 6. 执行 Windows 打包
      - name: Build Windows
        run: |
          cd simple_live_app
          flutter_distributor package --platform windows --targets msix,zip --skip-clean

      # 7. 上传构建产物
      - name: Upload Windows APP to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: |
            simple_live_app/build/dist/**/*.msix
            simple_live_app/build/dist/**/*.zip

      # 8. 完成提示
      - run: echo "✅ Windows build job status is ${{ job.status }}."
